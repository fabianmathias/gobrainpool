name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.x", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: gofmt -l (excluding fiat-generated code)
        run: |
          drift=$(find . -type f -name '*.go' -not -path './internal/fiat/*' -exec gofmt -l {} +)
          if [ -n "$drift" ]; then
            echo "Files need gofmt:"
            echo "$drift"
            exit 1
          fi
